<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<!-- iPhoneでホーム画面に追加した際に、URLバー・タブなしのアプリのように起動させるための設定 -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>ROCK BUSTER AR - レトロARボスバトル</title>

<!-- レトロ風ドットフォント（Google Fonts CDN） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ============================================
       AR ゲームのルートコンテナ
       中に「カメラ映像」と「ゲーム描画キャンバス」を重ねる
  ============================================ -->
  <div id="game-root">

    <!-- インカメラ映像（自分の姿がここに映る） -->
    <video id="camera-video" autoplay playsinline muted></video>

    <!-- 骨格・敵・弾・エフェクトを描画するキャンバス（映像の上に重なる） -->
    <canvas id="game-canvas"></canvas>

    <!-- 画面全体を囲むドット絵ブロックの枠（ロックマン風ボス部屋演出。装飾のみで当たり判定には影響しない） -->
    <canvas id="frame-canvas"></canvas>

    <!-- ブラウン管風スキャンライン・ノイズ演出（CSSのみ） -->
    <div id="crt-overlay"></div>

    <!-- 縦持ち時に表示する「横にしてください」案内。横持ちになるまでゲームは一時停止する -->
    <div id="rotate-overlay" class="hidden">
      <div class="pixel-box">
        <p class="rotate-icon">📱↻</p>
        <p>スマホを横向きにしてください</p>
        <p class="small-text">このゲームは横持ち専用です</p>
      </div>
    </div>

    <!-- デプロイ確認用のバージョン表示（常に最前面・小さく表示） -->
    <div id="version-tag"></div>

    <!-- 全画面表示ボタン（左下）。対応環境ではブラウザのURLバー等を隠して全画面にする -->
    <button id="fullscreen-btn" aria-label="全画面表示">⛶</button>

    <!-- 全画面表示に対応していない環境向けの案内（iPhone Safariなど） -->
    <div id="fullscreen-hint" class="hidden"></div>

    <!-- ロード中・キャリブレーション中の画面 -->
    <div id="loading-screen">
      <div class="pixel-box">
        <p class="blink">LOADING...</p>
        <p id="loading-detail" class="small-text">姿勢推定モデルを読み込み中</p>
      </div>
    </div>

    <!-- キャリブレーション（シルエット位置合わせ）画面 -->
    <div id="calibration-screen" class="hidden">
      <div class="pixel-box">
        <p>画面のシルエットに合わせてください</p>
        <p class="small-text">肩の位置と高さをだいたい合わせると自動でスタートします</p>
        <p id="align-status" class="align-status">位置を合わせています...</p>
        <div id="calib-bar-outer"><div id="calib-bar-inner"></div></div>
      </div>
    </div>

    <!-- スタート画面 -->
    <div id="start-screen" class="hidden">
      <div class="pixel-box">
        <p class="title-text">ROCK BUSTER AR</p>
        <p class="small-text">腕を伸ばして肘を曲げるとエネルギー弾発射</p>
        <p class="small-text">ジャンプで地上弾を回避 / しゃがみで空中弾を回避</p>
        <p class="small-text blink">まもなく自動スタートします...</p>
        <button id="start-btn" class="pixel-btn">TAP TO SKIP</button>
      </div>
    </div>

    <!-- ============ ゲーム中 HUD ============ -->
    <div id="hud" class="hidden">
      <div class="hp-row">
        <span class="hp-label">PLAYER</span>
        <div class="hp-bar-outer"><div id="player-hp-bar" class="hp-bar-inner player-hp"></div></div>
      </div>
      <div class="hp-row">
        <span class="hp-label">BOSS</span>
        <div class="hp-bar-outer"><div id="boss-hp-bar" class="hp-bar-inner boss-hp"></div></div>
      </div>

      <div id="charge-gauge-wrap">
        <span class="hp-label">CHARGE</span>
        <div class="hp-bar-outer"><div id="charge-bar" class="hp-bar-inner charge-fill"></div></div>
      </div>

      <div id="status-text"></div>
    </div>

    <!-- 結果画面（勝利／敗北） -->
    <div id="result-screen" class="hidden">
      <div class="pixel-box">
        <p id="result-title" class="title-text"></p>
        <button id="retry-btn" class="pixel-btn">RETRY</button>
      </div>
    </div>

  </div>

  <!-- =====================================================
       MediaPipe Tasks Vision (Pose Landmarker) を CDN から読み込み
       npm不要・GitHub Pagesでそのまま動作
  ===================================================== -->
  <script type="module" src="script.js"></script>
</body>
</html>
