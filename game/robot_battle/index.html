<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ROBOT FIGHTING GAME</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;font-family:'Courier New',monospace;overflow:hidden}
#scaler{transform-origin:top left;position:absolute;top:0;left:0;width:1920px}
#wrapper{width:1920px;background:#0a0a1a}
#gcw{position:relative;width:1920px;height:1080px;overflow:hidden}
#gc,#spLayer,#fwc,#bgLayer{display:block;width:1920px;height:1080px;position:absolute;top:0;left:0;image-rendering:pixelated;image-rendering:crisp-edges}
#bgLayer{z-index:0}
#gc{z-index:1}
#fwc{pointer-events:none;z-index:7}
#blackout{position:absolute;top:0;left:0;width:100%;height:100%;background:#000;opacity:0;pointer-events:none;z-index:8;transition:opacity .06s}
#spLayer{pointer-events:none;z-index:9;opacity:0;transition:opacity .06s}
#ann{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);font-size:100px;font-weight:bold;color:#fff;pointer-events:none;text-align:center;opacity:0;transition:opacity .2s;white-space:nowrap;z-index:15;text-shadow:0 0 40px #fff,0 0 80px #fff}
#sub-ann{position:absolute;top:54%;left:50%;transform:translate(-50%,-50%);font-size:130px;font-weight:bold;color:#ffcc00;pointer-events:none;text-align:center;opacity:0;transition:opacity .2s;white-space:nowrap;z-index:15;text-shadow:0 0 50px #ffcc00,0 0 100px #ffcc00}
#intro{position:absolute;top:0;left:0;width:100%;height:100%;background:#05050f;display:flex;align-items:center;justify-content:center;z-index:20}
#intro.gone{display:none}
/* Hide HUD areas while intro is showing */
.intro-visible #hud,.intro-visible #sb{visibility:hidden;}
/* HUD */
#hud{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:#050510;gap:10px;width:1920px}
.fhud{flex:1;min-width:0}
.frow{display:flex;align-items:center;gap:10px}
.frow.r{flex-direction:row-reverse}
.fface{width:80px;height:80px;border-radius:6px;overflow:hidden;background:#fff;border:3px solid #555;flex-shrink:0}
.fface img{width:100%;height:100%;object-fit:cover}
.fface.empty{display:flex;align-items:center;justify-content:center;font-size:28px;color:#aaa;background:#fff}
.fbars{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px}
.fn{font-size:20px;font-weight:bold;color:#aaa;letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fn.r{text-align:right}
.hbb{width:100%;height:26px;background:#0a0a18;border-radius:0;overflow:hidden;border:3px solid #2a2a4a;position:relative}
.hb-i{height:100%;position:absolute;top:0;transition:width .12s}
.hb-i.p1{left:0;background:repeating-linear-gradient(90deg,#22cc44 0,#22cc44 18px,#11aa33 18px,#11aa33 20px);box-shadow:inset -4px 0 0 #44ff66}
.hb-i.p2{right:0;background:repeating-linear-gradient(270deg,#22cc44 0,#22cc44 18px,#11aa33 18px,#11aa33 20px);box-shadow:inset 4px 0 0 #44ff66}
.gbb{width:100%;height:14px;background:#080812;border-radius:0;overflow:hidden;border:2px solid #222;position:relative}
.gb-i{height:100%;position:absolute;top:0;transition:width .15s}
.gb-i.p1{left:0;background:repeating-linear-gradient(90deg,#2244dd 0,#2244dd 14px,#1133bb 14px,#1133bb 16px);border-right:3px solid #88aaff}
.gb-i.p2{right:0;background:repeating-linear-gradient(270deg,#2244dd 0,#2244dd 14px,#1133bb 14px,#1133bb 16px);border-left:3px solid #88aaff}
.wd{font-size:20px;color:#ffcc00;letter-spacing:1px}
.wd.r{text-align:right}
#chud{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:150px}
#tim{font-size:76px;font-weight:bold;color:#fff;line-height:1}
#rnd{font-size:20px;color:#888;letter-spacing:3px}
/* status bar */
#sb{padding:10px 28px;background:#030308;border-top:1px solid #111;display:flex;gap:14px;flex-wrap:wrap;width:1920px}
.at{font-size:20px;padding:5px 16px;border-radius:5px;background:#111;color:#666;letter-spacing:1px}
.at.ac{background:#1a2a4a;color:#66aaff}.at.sp{background:#2a1a4a;color:#aa66ff}.at.ht{background:#2a1a1a;color:#ff6644}.at.hl{background:#1a2a1a;color:#44cc66}.at.ch{background:#2a2a1a;color:#ccaa33}
/* upload / config area */
#ua{padding:20px 28px;background:#050510;border-top:1px solid #111;width:1920px}
.ua-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.ua-player{background:#0d0d20;border:1px solid #222;border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:12px}
.ua-player h3{font-size:18px;color:#aaa;letter-spacing:3px;margin-bottom:4px}
.ua-row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.iub{width:140px;height:70px;border:2px dashed #333;border-radius:8px;background:#0d0d1a;color:#444;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;overflow:hidden;position:relative;flex-shrink:0}
.iub:hover{border-color:#555;color:#888}
.iub img{position:absolute;width:100%;height:100%;object-fit:contain}
.iub input{display:none}
.iub-label{font-size:11px;color:#555;text-align:center;margin-top:2px}
.name-inp{background:#111;border:1px solid #333;border-radius:6px;color:#ccc;font-size:18px;padding:8px 12px;font-family:'Courier New',monospace;width:260px}
.name-inp:focus{outline:none;border-color:#555}
.sel-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.sel-label{font-size:13px;color:#666;letter-spacing:1px;min-width:110px}
.ua-select{background:#111;border:1px solid #333;border-radius:6px;color:#ccc;font-size:14px;padding:6px 10px;font-family:'Courier New',monospace;cursor:pointer}
.ua-select:focus{outline:none;border-color:#555}
</style>
</head>

<script>
// ===== RESCALE =====
function rescale(){
  var s=document.getElementById('scaler');
  var scale=Math.min(window.innerWidth/1920,window.innerHeight/1080);
  s.style.transform='scale('+scale+')';
  s.style.left=((window.innerWidth-1920*scale)/2)+'px';
  s.style.top=((window.innerHeight-1080*scale)/2)+'px';
}
window.addEventListener('resize',rescale);rescale();

// ===== CANVAS SETUP =====
var bgCanvas=document.getElementById('bgLayer'),bgctx=bgCanvas.getContext('2d');
var canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
var spCanvas=document.getElementById('spLayer'),sctx=spCanvas.getContext('2d');
var fwc=document.getElementById('fwc'),fwctx=fwc.getContext('2d');
var ic=document.getElementById('ic'),ictx=ic.getContext('2d');
var W=1920,H=1080,FLOOR=H-200;
var BASE_SPEED=0.5;
var CHAR_HALF=90;
// Pixel art grid
var PX=2;
var PW=Math.floor(1920/PX),PH=Math.floor(1080/PX),PFLOOR=Math.floor((1080-200)/PX);
var pxCanvas=document.createElement('canvas');
pxCanvas.width=PW;pxCanvas.height=PH;
var pxctx=pxCanvas.getContext('2d');
pxctx.imageSmoothingEnabled=false;
function pxR(c,x,y,w,h,col){if(col)c.fillStyle=col;c.fillRect(Math.floor(x),Math.floor(y),Math.max(1,Math.floor(w)),Math.max(1,Math.floor(h)));}
var imgs={p1f:null,p1b:null,p2f:null,p2b:null,exp1:null,exp2:null,exp3:null,fire1:null,fire2:null,fire3:null,proj1:null,proj2:null,proj3:null};
(function(){
  var expFrames=['EXP_1','EXP_2','EXP_3'];
  expFrames.forEach(function(name,i){
    var im=new Image();
    im.src='assets/'+name+'.PNG';
    imgs['exp'+(i+1)]=im;
  });
  // Fire rush frames: FIRE_1=small(startup), FIRE_2=medium, FIRE_3=large(peak)
  var fireFrames=['FIRE_1','FIRE_2','FIRE_3'];
  fireFrames.forEach(function(name,i){
    var im=new Image();
    im.src='assets/'+name+'.PNG';
    imgs['fire'+(i+1)]=im;
  });
  // Projectile frames: PROJ_1=small, PROJ_2=medium, PROJ_3=large
  var projFrames=['PROJ_1','PROJ_2','PROJ_3'];
  projFrames.forEach(function(name,i){
    var im=new Image();
    im.src='assets/'+name+'.PNG';
    imgs['proj'+(i+1)]=im;
  });
})();

// Move type params
var MOVE_TYPES={
  normal: {jf:-20,walkSpd:7,stepSpd:50,jumpHSpd:16},
  speedster:{jf:-16,walkSpd:13,stepSpd:50,jumpHSpd:22},
  jumper:   {jf:-32,walkSpd:7,stepSpd:30,jumpHSpd:20},
  stepper: {jf:-20,walkSpd:5,stepSpd:90,jumpHSpd:14}
};

// ===== AUDIO =====
// Pool-based audio: pre-create a small pool of <audio> clones per sound.
// Picks the first idle one and plays it. No unbounded DOM growth.
var SFX_POOL={};
var POOL_SIZE=4; // max simultaneous plays per sound
function initPools(){
  var ids=['jump','light','heavy','projectile','special','kiran',
           'hit_light','hit_heavy','hit_special','explosion','gong',
           'heal','charge','victory'];
  // explosion can overlap more
  var sizes={explosion:4,hit_light:3,hit_heavy:3,hit_special:2,gong:1,special:1,kiran:1,victory:1};
  ids.forEach(function(id){
    var src=document.getElementById('snd-'+id);
    if(!src)return;
    var n=sizes[id]||POOL_SIZE;
    var pool=[];
    for(var i=0;i<n;i++){
      var el=src.cloneNode();
      el.load();
      pool.push(el);
    }
    SFX_POOL[id]=pool;
  });
}
function playSound(id){
  var pool=SFX_POOL[id];
  if(!pool)return;
  for(var i=0;i<pool.length;i++){
    var el=pool[i];
    if(el.paused||el.ended||el.currentTime===0){
      el.currentTime=0;
      el.play().catch(function(){});
      return;
    }
  }
  // All busy: pick the one furthest through its playback (least disruptive to interrupt)
  var best=pool[0],bestT=0;
  for(var i=0;i<pool.length;i++){
    if(pool[i].currentTime>bestT){bestT=pool[i].currentTime;best=pool[i];}
  }
  best.currentTime=0;
  best.play().catch(function(){});
}

      x:x+(Math.random()-.5)*size*.8,

      life:EXP_TOTAL_LIFE,ml:EXP_TOTAL_LIFE,

  globalExplosions.push({
    x:x,y:y,
    size:size*1.2,
    life:EXP_TOTAL_LIFE,ml:EXP_TOTAL_LIFE,
    vx:0,vy:0
  });
}

function triggerSpecialBlackout(attacker){
  spAttacker=attacker;spEffectActive=true;spTimer=Math.round(22/BASE_SPEED);
  blackoutEl.style.transition='opacity 0.06s';blackoutEl.style.opacity='1';
  spCanvas.style.opacity='1';frozen=true;
  sfxKiran();
  // Pre-render attacker glow to offscreen canvas (avoids per-frame shadowBlur)
  spGlowCache=buildGlowCache(attacker);
  setTimeout(function(){blackoutEl.style.opacity='0';setTimeout(function(){frozen=false;},100);},480);
  // spTimer handles fadeout; just ensure canvas hidden after animation
}
function buildGlowCache(attacker){
  var fw=attacker.w,fh=attacker.h;
  var pad=120; // room for glow
  var oc=document.createElement('canvas');
  oc.width=fw+pad*2;oc.height=fh+pad*2;
  var octx=oc.getContext('2d');
  var bImg=attacker.id==='p1'?imgs.p1b:imgs.p2b;
  if(!bImg)return null;
  // Draw with shadowBlur ONCE into offscreen canvas
  var ar=bImg.naturalWidth/bImg.naturalHeight;
  var dh=fh,dw=fh*ar;
  var ox=oc.width/2,oy=fh+pad;
  octx.save();
  octx.translate(ox,oy);
  // 3 glow passes (one-time cost)
  var glows=[{blur:80,alpha:0.5},{blur:40,alpha:0.7},{blur:12,alpha:0.9}];
  glows.forEach(function(g){
    octx.save();
    octx.shadowColor=attacker.acc;octx.shadowBlur=g.blur;
    octx.globalAlpha=g.alpha;
    octx.drawImage(bImg,-dw/2,-fh,dw,dh);
    octx.restore();
  });
  // Color overlay
  octx.globalAlpha=0.35;octx.fillStyle=attacker.acc;
  octx.fillRect(-dw/2,-fh,dw,dh);
  // Final crisp draw
  octx.globalAlpha=1;octx.drawImage(bImg,-dw/2,-fh,dw,dh);
  octx.restore();
  return {canvas:oc,ox:ox,oy:oy,fw:fw,fh:fh,facing:attacker.facing};
}

function drawIntro(){
  ictx.clearRect(0,0,W,H);

  var p2n=document.getElementById('p2name-inp').value||'P2 ROBOT';

  // Red corner (P2) - right half
  ictx.fillStyle='#2a0808';ictx.fillRect(halfW,0,halfW,H);
  // Grid lines (subtle)
  ictx.strokeStyle='rgba(255,255,255,0.025)';ictx.lineWidth=1;
  for(var i=0;i<W;i+=80){ictx.beginPath();ictx.moveTo(i,0);ictx.lineTo(i,H);ictx.stroke();}
  for(var j=0;j<H;j+=80){ictx.beginPath();ictx.moveTo(0,j);ictx.lineTo(W,j);ictx.stroke();}

  // Panel border glow
  var pulse=Math.sin(t*2.5)*6;
  // Blue side border (right edge of left panel)
  ictx.strokeStyle='#3388ff';ictx.lineWidth=4;
  ictx.shadowColor='#3388ff';ictx.shadowBlur=18+pulse;
  ictx.strokeRect(4,4,halfW-8,H-8);ictx.shadowBlur=0;
  // Red side border
  ictx.strokeStyle='#ff4433';ictx.lineWidth=4;
  ictx.shadowColor='#ff4433';ictx.shadowBlur=18+pulse;
  ictx.strokeRect(halfW+4,4,halfW-8,H-8);ictx.shadowBlur=0;

  // Center VS divider
  ictx.strokeStyle='#ffcc00';ictx.lineWidth=6;
  ictx.shadowColor='#ffcc00';ictx.shadowBlur=22+Math.sin(t*3)*8;
  ictx.beginPath();ictx.moveTo(W/2,0);ictx.lineTo(W/2,H);ictx.stroke();ictx.shadowBlur=0;

  // Helper: draw face image filling the panel (aspect-ratio preserved, centered)
  // imgArea: {x,y,w,h} = available rectangle
  function drawFacePanel(img,col,lbl,panelX,panelW){
    var pad=20;
    var lblH=70; // space at bottom for name label
    var availW=panelW-pad*2;
    var availH=H-pad*2-lblH;
    if(img){
      var imgAR=img.naturalWidth/img.naturalHeight;
      var boxAR=availW/availH;
      var drawW,drawH;
      if(imgAR>boxAR){drawW=availW;drawH=availW/imgAR;}
      else{drawH=availH;drawW=availH*imgAR;}
      var dx=panelX+pad+(availW-drawW)/2;
      var dy=pad+(availH-drawH)/2;
      ictx.drawImage(img,dx,dy,drawW,drawH);
    }else{
      ictx.fillStyle='#111';ictx.fillRect(panelX+pad,pad,availW,availH);
      ictx.fillStyle=col;ictx.font='32px Courier New';ictx.textAlign='center';
      ictx.fillText('UPLOAD IMAGE',panelX+panelW/2,pad+availH/2);
    }
    // Corner label
    ictx.font='bold 20px Courier New';ictx.fillStyle=col;
    ictx.shadowColor=col;ictx.shadowBlur=10;
    ictx.textAlign='center';
    var cornerTxt=col==='#3388ff'?'BLUE CORNER':'RED CORNER';
    ictx.fillText(cornerTxt,panelX+panelW/2,pad+30);ictx.shadowBlur=0;
    // Name label at bottom
    ictx.font='bold 44px Courier New';ictx.fillStyle=col;
    ictx.shadowColor=col;ictx.shadowBlur=14;
    ictx.fillText(lbl.toUpperCase(),panelX+panelW/2,H-pad-8);ictx.shadowBlur=0;
  }

  drawFacePanel(imgs.p1f,'#3388ff',p1n,0,halfW);
  drawFacePanel(imgs.p2f,'#ff4433',p2n,halfW,halfW);

  // VS badge
  var vs=1+Math.sin(t*4)*.06;
  ictx.save();ictx.translate(W/2,H/2);ictx.scale(vs,vs);
  // Badge circle
  // Pixel VS badge: rounded square
  ictx.fillStyle='#000';ictx.globalAlpha=0.75;
  ictx.fillRect(-88,-88,176,176);
  ictx.globalAlpha=1;
  ictx.fillStyle='#ffcc00';
  var vbt=6;
  ictx.fillRect(-90,-90,180,vbt);  // top
  ictx.fillRect(-90, 90-vbt,180,vbt); // bottom
  ictx.fillRect(-90,-90+vbt,vbt,180-vbt*2); // left
  ictx.fillRect(90-vbt,-90+vbt,vbt,180-vbt*2); // right
  ictx.font='bold 100px Courier New';ictx.fillStyle='#ffcc00';ictx.textAlign='center';
  ictx.shadowColor='#ffcc00';ictx.shadowBlur=40;ictx.fillText('VS',0,32);ictx.shadowBlur=0;
  ictx.restore();

  // Tap to start
  ictx.font='bold 28px Courier New';ictx.fillStyle='#ffcc00';ictx.textAlign='center';
  if(Math.floor(t*2)%2===0){
    ictx.shadowColor='#ffcc00';ictx.shadowBlur=10;
    ictx.fillText('[ TAP TO START ]',W/2,H-16);
    ictx.shadowBlur=0;
  }
}

// ===== SEPARATOR =====
function separateFighters(a,b){
  if(!a.onGround||!b.onGround)return;
  var minDist=CHAR_HALF*2+10;
  var dist=b.x-a.x;
  if(Math.abs(dist)<minDist){
    var overlap=minDist-Math.abs(dist);
    var dir=dist>=0?1:-1;
    a.x-=dir*overlap*0.5;b.x+=dir*overlap*0.5;
    a.x=Math.max(CHAR_HALF+4,Math.min(W-CHAR_HALF-4,a.x));
    b.x=Math.max(CHAR_HALF+4,Math.min(W-CHAR_HALF-4,b.x));
  }
}

// ===== FIGHTER CLASS =====
function Fighter(id,x,facing,col,acc,cfg){
  this.id=id;this.x=x;this.y=FLOOR;this.vy=0;this.facing=facing;
  this.hp=MAX_HP;this.gauge=0;this.wins=0;
  this.state='idle';this.stateTimer=0;
  this.invTimer=0;this.hitFlash=0;
  this.col=col;this.acc=acc;
  this.cfg=cfg||{strat:'balanced',moveType:'normal',heavyType:'rush',specialType:'rush'};
  var mt=MOVE_TYPES[this.cfg.moveType]||MOVE_TYPES.normal;
  this.JF=mt.jf*BASE_SPEED;
  this.walkSpd=mt.walkSpd*BASE_SPEED;
  this.stepSpd=mt.stepSpd*BASE_SPEED;
  this.jumpHSpd=mt.jumpHSpd*BASE_SPEED;
  this.onGround=true;this.aLog='IDLE';
  this.w=180;this.h=300;
  this.stepVx=0;this.stepTimer=0;
  this.cpuCD=0;this.particles=[];
  this.moveDir=0;this.jumpDir=0;
  this.knockVx=0;this.knockVy=0;
  this.glowTimer=0;
  this.dead=false;this.deathTimer=0;this.deathExpCount=0;
  this.visible=true;
  this.cpuMode='neutral';this.cpuModeTimer=0;
  this.airAttackDone=false;
  this.lockedFacing=false;
  this.victoryBob=0;this.victoryBobDir=1;this.isWinner=false;
  // Rush/uppercut movement for heavy/special
  this.rushVx=0;
  this.rushStartup=0; // frames before hitbox opens for rush/uppercut
  this.uppercutInvTimer=0;
  this.hitDone=false;  // true once this attack has landed – prevents multi-hit
  this.inAction=false; // for heal/charge states
}
Fighter.prototype.isIn=function(){
  for(var i=0;i<arguments.length;i++)if(this.state===arguments[i])return true;
  return false;
};
Fighter.prototype._canActGround=function(){return this.isIn('idle','walk')&&this.onGround&&!this.dead;};
Fighter.prototype._canActAir=function(){return !this.onGround&&!this.isIn('lightAttack','heavyAttack','special','heal','charge')&&!this.dead&&!this.airAttackDone;};

Fighter.prototype.api_lightAttack=function(){
  if(this._canActGround()){this.state='lightAttack';this.stateTimer=Math.round(22/BASE_SPEED);this.aLog='WEAK ATTACK';this.lockedFacing=true;this.hitDone=false;sfxLight();}
  else if(this._canActAir()){this.state='lightAttack';this.stateTimer=Math.round(18/BASE_SPEED);this.aLog='AIR WEAK';this.airAttackDone=true;this.lockedFacing=true;this.hitDone=false;sfxLight();}
};
Fighter.prototype.api_heavyAttack=function(){
  if(!this._canActGround())return;
  var htype=this.cfg.heavyType||'rush';
  this.lockedFacing=true;
  if(htype==='projectile'){
    this.state='heavyAttack';this.stateTimer=Math.round(28/BASE_SPEED);
    this.aLog='HEAVY: SHOT';this.hitDone=false;sfxProjectile();
    spawnProjectile(this.x+this.facing*80,this.y-this.h*.6,this.facing,false,this);
  }else if(htype==='uppercut'){
    this.state='heavyAttack';this.stateTimer=Math.round(32/BASE_SPEED);
    this.aLog='HEAVY: UPPER';this.hitDone=false;sfxHeavy();
    this.vy=this.JF*0.7;this.onGround=false;this.jumpDir=this.facing;
    this.rushVx=0;
    this.rushStartup=0;
    this.uppercutInvTimer=Math.round(16/BASE_SPEED);
  }else{// rush
    this.state='heavyAttack';this.stateTimer=Math.round(34/BASE_SPEED);
    this.aLog='HEAVY: RUSH';this.hitDone=false;sfxHeavy();
    this.rushVx=0; // attacker stays put; hitbox extends forward
    this.rushStartup=0;
  }
};
Fighter.prototype.api_jump=function(dir){
  if(!this.onGround||this.isIn('lightAttack','heavyAttack','special','hit','knockback','heal','charge')||this.dead)return;
  this.vy=this.JF;this.onGround=false;this.jumpDir=dir||0;
  this.airAttackDone=false;this.lockedFacing=true;
  this.state='jump';this.aLog=dir>0?'JUMP FORWARD':dir<0?'JUMP BACK':'JUMP';sfxJump();
};
Fighter.prototype.api_special=function(){
  if(this.gauge<MAX_G||!this._canActGround()||gState==='matchEnd')return;
  this.gauge=0;this.lockedFacing=true;
  var stype=this.cfg.specialType||'rush';
  if(stype==='projectile'){
    this.state='special';this.stateTimer=Math.round(55/BASE_SPEED);
    this.aLog='SPECIAL: SHOT';this.hitDone=false;
    spawnProjectile(this.x+this.facing*100,this.y-this.h*.55,this.facing,true,this);
    this.glowTimer=Math.round(40/BASE_SPEED);
    triggerSpecialBlackout(this);showAnn('SPECIAL!!',900,false);sfxSpecial();
  }else if(stype==='uppercut'){
    this.state='special';this.stateTimer=Math.round(65/BASE_SPEED);
    this.aLog='SPECIAL: UPPER';this.hitDone=false;
    this.vy=this.JF*1.1;this.onGround=false;this.jumpDir=this.facing;
    this.rushVx=0;
    this.glowTimer=Math.round(65/BASE_SPEED);
    this.rushStartup=0;
    this.uppercutInvTimer=Math.round(20/BASE_SPEED);
    triggerSpecialBlackout(this);showAnn('SPECIAL!!',900,false);sfxSpecial();
  }else{// rush
    this.state='special';this.stateTimer=Math.round(65/BASE_SPEED);
    this.aLog='SPECIAL: RUSH';this.hitDone=false;
    this.rushVx=0;
    this.rushStartup=0;
    this.glowTimer=Math.round(65/BASE_SPEED);
    triggerSpecialBlackout(this);showAnn('SPECIAL!!',900,false);sfxSpecial();
  }
};
Fighter.prototype.api_step=function(dir){
  if(!this._canActGround())return;
  this.stepVx=dir*this.stepSpd;this.stepTimer=Math.round(12/BASE_SPEED);
  this.state='step';this.stateTimer=Math.round(12/BASE_SPEED);
  this.aLog=dir>0?'STEP FORWARD':'STEP BACK';
};
Fighter.prototype.api_move=function(dir){this.moveDir=dir;};
Fighter.prototype.api_heal=function(){
  if(!this._canActGround()||this.hp>=MAX_HP)return;
  // 1回の使用でHP最大値の8%だけ回復（全回復不可）
  this.healTarget=Math.min(MAX_HP, this.hp + MAX_HP*0.08);
  this.healStart=this.hp;
  this.state='heal';this.stateTimer=Math.round(30/BASE_SPEED);this.aLog='HEALING';sfxHeal();
};
Fighter.prototype.api_charge=function(){
  if(!this._canActGround()||this.gauge>=MAX_G)return;
  // 1回の使用でゲージ最大値の12%だけ増加（満タン不可）
  this.chargeTarget=Math.min(MAX_G, this.gauge + MAX_G*0.20);
  this.chargeStart=this.gauge;
  this.state='charge';this.stateTimer=Math.round(30/BASE_SPEED);this.aLog='CHARGING';sfxCharge();
};
Fighter.prototype._spawnParts=function(){
  for(var i=0;i<22;i++)this.particles.push({
    x:this.x,y:this.y-this.h/2,
    vx:(Math.random()-.5)*28*BASE_SPEED,vy:(Math.random()-.5)*28*BASE_SPEED,
    life:50,ml:50,r:10+Math.random()*18,c:this.acc
  });
};
Fighter.prototype.takeDamage=function(dmg,kind,attackerX,attackerObj){
  if(this.invTimer>0||this.dead||this.uppercutInvTimer>0)return false;
  this.hp=Math.max(0,this.hp-dmg);
  if(this.hp<=0)this.hp=0; // ensure exact 0 for display
  this.invTimer=Math.round(25/BASE_SPEED);this.hitFlash=10;
  // ALWAYS push away from attacker
  var pushDir=this.x>=attackerX?1:-1;
  var sz=kind==='special'?240:kind==='heavy'?160:90;
  var cnt=kind==='special'?18:kind==='heavy'?12:7;
  spawnExplosion(this.x,this.y-this.h*.5,sz,cnt);
  sfxHit(kind);sfxExplosion();
  // Store who hit us (for wall pushback)
  this._lastAttacker=attackerObj||null;
  // Cancel any ongoing movement/jump – damage takes priority
  this.jumpDir=0;this.stepVx=0;this.stepTimer=0;this.rushVx=0;this.rushStartup=0;this.moveDir=0;
  if(kind==='special'){
    // force to ground state if in air to allow sliding
    if(!this.onGround){this.vy=0;this.y=FLOOR;this.onGround=true;}
    this.state='knockback';this.stateTimer=Math.round(100/BASE_SPEED);
    this.vy=-16*BASE_SPEED;
    // High velocity that decays slowly = reaches wall
    this.knockVx=pushDir*270*BASE_SPEED;
    this.aLog='BLOWBACK!!';
  }else if(kind==='heavy'){
    this.state='hit';this.stateTimer=Math.round(26/BASE_SPEED);
    this.knockVx=pushDir*195*BASE_SPEED;this.aLog='HEAVY HIT';
  }else{
    this.state='hit';this.stateTimer=Math.round(20/BASE_SPEED);
    this.knockVx=pushDir*96*BASE_SPEED;this.aLog='HIT';
  }
  return true;
};
Fighter.prototype.gainG=function(a){this.gauge=Math.min(MAX_G,this.gauge+a);};
Fighter.prototype.startDeath=function(){
  if(this.dead)return;
  this.dead=true;this.deathTimer=0;this.deathExpCount=0;this.state='dead';
};

// ===== CPU AI =====
Fighter.prototype.cpuThink=function(opp,dt){if(dt)this._dt=dt;
  var S2=this._dt*60||1;
  this.cpuCD-=S2;
  if(this.cpuModeTimer>0){this.cpuModeTimer-=S2;if(this.cpuModeTimer<0)this.cpuModeTimer=0;}
  if(this.cpuCD>0||this.dead)return;
  if(!this._canActGround()&&!this.isIn('jump','walk'))return;
  var dist=Math.abs(this.x-opp.x);
  var r=Math.random();
  if(!this.lockedFacing)this.facing=opp.x>this.x?1:-1;
  var fwd=opp.x>this.x?1:-1,bk=-fwd;
  var strat=this.cfg.strat||'balanced';
  var htype=this.cfg.heavyType||'rush';
  var stype=this.cfg.specialType||'rush';

  // --- DODGE incoming projectiles ---
  // Check if an enemy projectile is heading toward this fighter on ground
  if(this.onGround&&this._canActGround()){
    for(var pi=0;pi<projectiles.length;pi++){
      var proj=projectiles[pi];
      if(proj.owner===this)continue; // own projectile
      var projApproaching=(proj.dir>0&&proj.x<this.x)||(proj.dir<0&&proj.x>this.x);
      var projDist=Math.abs(proj.x-this.x);
      var projVertClose=Math.abs(proj.y-(this.y-this.h*0.5))<this.h*0.6;
      if(projApproaching&&projDist<600&&projVertClose&&Math.random()<0.55){
        // jump to dodge
        this.api_jump(Math.random()<0.4?bk:0);
        this.cpuCD=18;
        return;
      }
    }
  }

  // --- PROJECTILE attack at range (low frequency) ---
  // If our heavy or special is projectile type, use it at long range occasionally
  var projCooldownKey='_projCD';
  if(!this[projCooldownKey])this[projCooldownKey]=0;
  this[projCooldownKey]=Math.max(0,this[projCooldownKey]-(this._dt*60||1));
  if(this[projCooldownKey]===0&&this._canActGround()){
    var useProj=false;
    // Special projectile at any range
    if(stype==='projectile'&&this.gauge>=MAX_G&&opp.invTimer<=0&&r<0.5){
      this.api_special();this.cpuCD=55;this[projCooldownKey]=80;return;
    }
    // Heavy projectile at range > 350 (low frequency: 12%)
    if(htype==='projectile'&&dist>350&&r<0.12){
      this.api_heavyAttack();this.cpuCD=40;this[projCooldownKey]=90;return;
    }
    // Special projectile at range > 350 even when gauge is partial? No – only when full
  }

  // Special trigger – common to all strategies
  if(this.gauge>=MAX_G&&opp.invTimer<=0&&r<(strat==='gauge'?0.7:0.45)){this.api_special();this.cpuCD=55;return;}

  // Heal trigger
  if(strat==='cautious'&&this.hp<MAX_HP*0.85&&r<0.28&&dist>300){this.api_heal();this.cpuCD=35;return;}
  if(strat==='balanced'&&this.hp<MAX_HP*0.5&&r<0.08&&dist>350){this.api_heal();this.cpuCD=40;return;}

  // Charge trigger
  if(strat==='gauge'&&this.gauge<MAX_G*0.8&&r<0.15&&dist>350){this.api_charge();this.cpuCD=40;return;}
  if(strat==='balanced'&&this.gauge<MAX_G*0.6&&r<0.06&&dist>350){this.api_charge();this.cpuCD=35;return;}

  // Mode selection
  if(this.cpuModeTimer<=0){
    var mr=Math.random();
    if(strat==='aggressive'){
      this.cpuMode='aggressive';this.cpuModeTimer=Math.round((60+Math.random()*40)/BASE_SPEED);
    }else if(strat==='cautious'){
      if(mr<0.5){this.cpuMode='retreat';}else{this.cpuMode='footsie';}
      this.cpuModeTimer=Math.round((60+Math.random()*50)/BASE_SPEED);
    }else if(strat==='gauge'){
      if(mr<0.35){this.cpuMode='retreat';}else if(mr<0.65){this.cpuMode='footsie';}else{this.cpuMode='aggressive';}
      this.cpuModeTimer=Math.round((55+Math.random()*45)/BASE_SPEED);
    }else{// balanced
      if(mr<0.3){this.cpuMode='aggressive';}else if(mr<0.6){this.cpuMode='footsie';}else{this.cpuMode='retreat';}
      this.cpuModeTimer=Math.round((65+Math.random()*50)/BASE_SPEED);
    }
  }

  if(this.cpuMode==='retreat'){
    if(dist<220){
      // Even in retreat, attack when very close
      if(r<0.35){this.api_lightAttack();this.cpuCD=22;}
      else if(r<0.55){this.api_step(bk);this.cpuCD=18;}
      else if(r<0.70){this.api_jump(bk);this.cpuCD=24;}
      else{this.api_move(bk);this.cpuCD=8;}
    }else if(dist<600){
      if(r<0.40){this.api_step(bk);this.cpuCD=20;}
      else if(r<0.58){this.api_jump(bk);this.cpuCD=24;}
      else{this.api_move(bk);this.cpuCD=8;}
    }else{if(r<0.35){this.api_step(fwd);this.cpuCD=16;}else{this.api_move(fwd);this.cpuCD=6;}}
    return;
  }
  if(this.cpuMode==='footsie'){
    if(dist<260){
      if(r<0.15){this.api_step(bk);this.cpuCD=16;}
      else if(r<0.42){this.api_lightAttack();this.cpuCD=22;}
      else if(r<0.68){this.api_heavyAttack();this.cpuCD=34;}
      else if(r<0.80){this.api_jump(fwd);this.cpuCD=20;}else{this.cpuCD=8;}
    }else if(dist<550){
      if(r<0.30){this.api_lightAttack();this.cpuCD=22;}
      else if(r<0.52){this.api_heavyAttack();this.cpuCD=34;}
      else if(r<0.64){this.api_step(fwd);this.cpuCD=14;}
      else if(r<0.74){this.api_step(bk);this.cpuCD=16;}
      else if(r<0.86){this.api_jump(fwd);this.cpuCD=20;}
      else{this.api_move(fwd);this.cpuCD=6;}
    }else{if(r<0.55){this.api_step(fwd);this.cpuCD=12;}else{this.api_move(fwd);this.cpuCD=6;}}
    return;
  }
  // aggressive
  if(dist<280){
    if(r<0.28){this.api_lightAttack();this.cpuCD=18;}
    else if(r<0.62){this.api_heavyAttack();this.cpuCD=32;}
    else if(r<0.72){this.api_jump(fwd);this.cpuCD=18;}
    else if(r<0.80){this.api_step(fwd);this.cpuCD=12;}
    else if(r<0.90){this.api_jump(bk);this.cpuCD=22;}
    else{this.cpuCD=8;}
  }else if(dist<650){
    if(r<0.48){this.api_step(fwd);this.cpuCD=12;}
    else if(r<0.66){this.api_jump(fwd);this.cpuCD=18;}
    else if(r<0.76){this.api_jump(bk);this.cpuCD=22;}
    else{this.api_move(fwd);this.cpuCD=6;}
  }else{if(r<0.65){this.api_step(fwd);this.cpuCD=12;}else{this.api_move(fwd);this.cpuCD=6;}}
  if(!this.onGround&&this._canActAir()&&dist<400&&Math.random()<0.7){
    if(Math.random()<0.45)this.api_lightAttack();else this.api_heavyAttack();
  }
};

Fighter.prototype.update=function(opp,dt){this._dt=dt||0.016;
  var S=this._dt*60;
  if(this.dead){
    this.deathTimer+=S;
    if(this.deathTimer>=12&&this.deathExpCount<8&&Math.floor(this.deathTimer/12)>this.deathExpCount){
      this.deathExpCount++;
      spawnExplosion(this.x+(Math.random()-.5)*180,this.y-Math.random()*this.h,200,8);
      sfxExplosion();
      if(this.deathExpCount>=8)this.visible=false;
    }
    return;
  }
  if(this.isWinner){
    this.victoryBob+=this.victoryBobDir*3*S;
    if(this.victoryBob>35||this.victoryBob<0)this.victoryBobDir*=-1;
    return;
  }

  // Heal tick – recover only up to healTarget, spread evenly over animation
  if(this.isIn('heal')){
    var healDuration=Math.round(30/BASE_SPEED);
    var healRate=(this.healTarget-this.healStart)/healDuration;
    this.hp=Math.min(this.healTarget, this.hp+healRate*S);
    this.particles.push({x:this.x+(Math.random()-.5)*60,y:this.y-this.h*Math.random(),
      vx:(Math.random()-.5)*2,vy:-2-Math.random()*2,life:20,ml:20,r:6+Math.random()*8,c:'#44ff88'});
  }
  // Charge tick – charge only up to chargeTarget, spread evenly over animation
  if(this.isIn('charge')){
    var chargeDuration=Math.round(30/BASE_SPEED);
    var chargeRate=(this.chargeTarget-this.chargeStart)/chargeDuration;
    this.gauge=Math.min(this.chargeTarget, this.gauge+chargeRate*S);
    this.particles.push({x:this.x+(Math.random()-.5)*60,y:this.y-this.h*Math.random(),
      vx:(Math.random()-.5)*2,vy:-2-Math.random()*2,life:20,ml:20,r:6+Math.random()*8,c:'#88aaff'});
  }

  // Gravity
  var GR=0.65*BASE_SPEED;
  if(!this.onGround){
    this.vy+=GR*S;this.y+=this.vy*S;
    if(this.jumpDir!==0)this.x+=this.jumpDir*this.jumpHSpd*S;
    if(this.y>=FLOOR){
      this.y=FLOOR;this.vy=0;this.onGround=true;this.jumpDir=0;
      this.airAttackDone=false;this.lockedFacing=false;
      if(this.isIn('jump','knockback','lightAttack','heavyAttack','special')){this.state='idle';this.knockVx=0;this.rushVx=0;}
    }
  }

  // Knockback slide – slow decay so it reaches wall
  if(this.knockVx!==0){
    this.x+=this.knockVx*S;
    this.knockVx*=Math.pow(0.90,S);
    if(Math.abs(this.knockVx)<0.4)this.knockVx=0;
    // Wall collision: transfer remaining velocity to attacker as pushback
    if(this.x<=CHAR_HALF+4){
      this.x=CHAR_HALF+4;
      if(Math.abs(this.knockVx)>2&&this._lastAttacker){
        this._lastAttacker.knockVx=-Math.abs(this.knockVx)*0.6;
      }
      this.knockVx=0;
    }
    if(this.x>=W-CHAR_HALF-4){
      this.x=W-CHAR_HALF-4;
      if(Math.abs(this.knockVx)>2&&this._lastAttacker){
        this._lastAttacker.knockVx=Math.abs(this.knockVx)*0.6;
      }
      this.knockVx=0;
    }
  }
  // Rush/uppercut movement
  if(this.rushVx!==0&&this.isIn('heavyAttack','special')){
    this.x+=this.rushVx*S;
    this.rushVx*=Math.pow(0.88,S);
    if(Math.abs(this.rushVx)<0.5)this.rushVx=0;
    this.x=Math.max(CHAR_HALF+4,Math.min(W-CHAR_HALF-4,this.x));
  }else if(!this.isIn('heavyAttack','special')){this.rushVx=0;}
  // Startup countdown (hitbox blocked until this reaches 0)
  if(this.rushStartup>0){this.rushStartup-=S;if(this.rushStartup<0)this.rushStartup=0;}

  // Step
  if(this.stepTimer>0){this.x+=this.stepVx*S;this.stepVx*=Math.pow(0.75,S);this.stepTimer-=S;if(this.stepTimer<0)this.stepTimer=0;}

  // Walk / idle
  if(this.isIn('idle','walk')&&this.onGround){
    if(this.moveDir!==0){this.x+=this.moveDir*this.walkSpd*S;this.state='walk';}
    else{
      var dist=Math.abs(this.x-opp.x);
      if(dist>420&&dist<1300){var d=opp.x>this.x?1:-1;this.x+=d*this.walkSpd*.5*S;this.state='walk';}
      else this.state='idle';
    }
  }
  if(this.isIn('idle','walk')&&this.onGround)this.lockedFacing=false;
  if(!this.lockedFacing)this.facing=opp.x>this.x?1:-1;
  if(this.stateTimer<=1&&this.isIn('lightAttack','heavyAttack','special'))this.lockedFacing=false;
  this.moveDir=0;
  // Decrement by S (= dt*60) so speed is frame-rate independent
  if(this.stateTimer>0){this.stateTimer-=S;if(this.stateTimer<=0){this.stateTimer=0;this.state=this.onGround?'idle':'jump';}}
  if(this.invTimer>0){this.invTimer-=S;if(this.invTimer<0)this.invTimer=0;}
  if(this.hitFlash>0){this.hitFlash-=S;if(this.hitFlash<0)this.hitFlash=0;}
  if(this.uppercutInvTimer>0){this.uppercutInvTimer-=S;if(this.uppercutInvTimer<0)this.uppercutInvTimer=0;}
  if(this.glowTimer>0){this.glowTimer-=S;if(this.glowTimer<0)this.glowTimer=0;}
  this.x=Math.max(CHAR_HALF+4,Math.min(W-CHAR_HALF-4,this.x));
  var SS=S; // capture for closure
  this.particles=this.particles.filter(function(p){
    p.x+=p.vx*SS;p.y+=p.vy*SS;
    p.vx*=Math.pow(0.88,SS);p.vy+=0.5*SS;
    p.life-=SS;return p.life>0;
  });
};

Fighter.prototype.getHitbox=function(){
  if(this.dead||this.hitDone)return null;
  if(this.rushStartup>0)return null; // still in approach phase, no hit yet
  var tiLA=Math.round(15/BASE_SPEED),tiHA=Math.round(26/BASE_SPEED),tiSP=Math.round(52/BASE_SPEED);
  var htype=this.cfg.heavyType||'rush';
  var stype=this.cfg.specialType||'rush';
  if(this.isIn('lightAttack')&&this.stateTimer<tiLA&&this.stateTimer>3)
    return{x:this.x+this.facing*140,y:this.y-this.h*.6,r:95,dmg:8,kind:'light'};
  if(this.isIn('heavyAttack')&&htype!=='projectile'&&this.stateTimer<tiHA&&this.stateTimer>5)
    return{x:this.x+this.facing*180,y:this.y-this.h*.55,r:130,dmg:18,kind:'heavy'};
  if(this.isIn('special')&&stype!=='projectile'&&this.stateTimer<tiSP&&this.stateTimer>5)
    return{x:this.x+this.facing*240,y:this.y-this.h*.5,r:200,dmg:36,kind:'special'};
  return null;
};

Fighter.prototype.draw=function(c){
  if(!this.visible)return;
  var cx=this.x,cy=this.y-(this.isWinner?this.victoryBob:0);
  var fw=this.w,fh=this.h;
  if(this.invTimer>0&&Math.floor(this.invTimer/4)%2===0)c.globalAlpha=0.35;
  var bImg=this.id==='p1'?imgs.p1b:imgs.p2b;
  c.save();c.translate(cx,cy);if(this.facing===-1)c.scale(-1,1);
  if(bImg){
    var sx=1,sy=1,oy=0;
    if(this.isIn('lightAttack')){sx=1.05;oy=-14;}
    else if(this.isIn('heavyAttack')){sx=1.12;oy=-28;}
    else if(this.isIn('special')){var p=Math.sin(Date.now()/50)*.1;sx=sy=1.2+p;oy=-20;}
    else if(this.isIn('jump')){oy=-18;sy=.88;}
    else if(this.isIn('hit','knockback')){sx=.88;oy=7;}
    else if(this.isIn('step')){sx=.95;oy=-7;}
    else if(this.isIn('heal')){var hpulse=1+Math.sin(Date.now()/100)*.04;sx=sy=hpulse;}
    else if(this.isIn('charge')){var cpulse=1+Math.sin(Date.now()/80)*.05;sx=sy=cpulse;}
    // Always render at fixed height = fh, width derived from aspect ratio
    var imgAR=bImg.naturalWidth/bImg.naturalHeight;
    var drawH=fh,drawW=fh*imgAR;
    var dx=-drawW/2,dy=-fh+oy;
    c.save();c.scale(sx,sy);c.drawImage(bImg,dx,dy,drawW,drawH);c.restore();
    // Heal/charge aura
    if(this.isIn('heal')){
      c.globalAlpha=0.25+0.1*Math.sin(Date.now()/100);c.fillStyle='#44ff88';
      c.fillRect(-fw/2,-fh,fw,fh);c.globalAlpha=1;
    }
    if(this.isIn('charge')){
      c.globalAlpha=0.25+0.1*Math.sin(Date.now()/80);c.fillStyle='#4488ff';
      c.fillRect(-fw/2,-fh,fw,fh);c.globalAlpha=1;
    }
  }else{this._drawFB(c,fw,fh);}
  if(this.hitFlash>0){c.fillStyle='rgba(255,80,0,0.4)';c.fillRect(-fw/2,-fh,fw,fh);}
  c.restore();c.globalAlpha=1;
  var hb=this.getHitbox();
  if(hb){
    c.save();
    var hcol=hb.kind==='special'?'#aa44ff':hb.kind==='heavy'?'#ff8800':'#ffcc00';
    var hcol2=hb.kind==='special'?'#cc88ff':hb.kind==='heavy'?'#ffaa44':'#ffee88';
    var hr=Math.round(hb.r/PX)*PX;
    var hgx=Math.round(hb.x/PX)*PX,hgy=Math.round(hb.y/PX)*PX;
    c.globalAlpha=.14;c.fillStyle=hcol;c.fillRect(hgx-hr,hgy-hr,hr*2,hr*2);
    var bt=PX*2;
    c.globalAlpha=.5;c.fillStyle=hcol2;
    c.fillRect(hgx-hr,hgy-hr,hr*2,bt);
    c.fillRect(hgx-hr,hgy+hr-bt,hr*2,bt);
    c.fillRect(hgx-hr,hgy-hr+bt,bt,hr*2-bt*2);
    c.fillRect(hgx+hr-bt,hgy-hr+bt,bt,hr*2-bt*2);
    c.restore();
  }
  this.particles.forEach(function(p){
    c.save();c.globalAlpha=p.life/p.ml*.85;c.fillStyle=p.c;
    var ps=Math.max(PX,Math.round(p.r/PX)*PX);
    var px2=Math.round(p.x/PX)*PX,py2=Math.round(p.y/PX)*PX;
    c.fillRect(px2-ps/2,py2-ps/2,ps,ps);c.restore();
  });
  if(this.gauge>=MAX_G&&!this.dead){
    c.save();
    var blink=Math.floor(Date.now()/180)%2===0;
    c.globalAlpha=blink?1:0.55;
    var bx=Math.round((cx-32)/PX)*PX,by=Math.round((cy-fh-60)/PX)*PX;
    c.fillStyle=this.acc;c.fillRect(bx,by,64,20);
    c.fillStyle='#000';c.fillRect(bx+2,by+2,60,16);
    c.fillStyle=this.acc;c.font='bold 13px monospace';c.textAlign='center';c.fillText('MAX',cx,by+14);
    c.restore();
  }
};

Fighter.prototype.drawOnSpecialLayer=function(c){
  if(!this.visible)return;
  var cx=this.x,cy=this.y,fw=this.w,fh=this.h;
  var bImg=this.id==='p1'?imgs.p1b:imgs.p2b;
  var isAtt=this===spAttacker;
  c.save();c.translate(cx,cy);if(this.facing===-1)c.scale(-1,1);
  if(isAtt){
    var isSpec=this.isIn('special');
    var sx=isSpec?1.2+Math.sin(Date.now()/50)*.1:1,sy=sx,oy=isSpec?-20:0;
    var passes=[{blur:120,alpha:0.45},{blur:70,alpha:0.65},{blur:30,alpha:0.82},{blur:10,alpha:1.0}];
    for(var pi=0;pi<passes.length;pi++){
      var pass=passes[pi];
      c.shadowColor=this.acc;c.shadowBlur=pass.blur;c.globalAlpha=pass.alpha;
      if(bImg){
        var ar2=bImg.naturalWidth/bImg.naturalHeight;
        var dh2=fh,dw2=fh*ar2;
        c.save();c.scale(sx,sy);c.drawImage(bImg,-dw2/2,-fh+oy,dw2,dh2);c.restore();
      }
      else this._drawFB(c,fw,fh);
    }
    c.globalAlpha=0.42+0.15*Math.sin(Date.now()/60);c.fillStyle=this.acc;c.shadowBlur=0;
    if(bImg){
      var ar3=bImg.naturalWidth/bImg.naturalHeight;
      var dh3=fh,dw3=fh*ar3;
      c.save();c.scale(sx,sy);c.fillRect(-dw3/2,-fh+oy,dw3,dh3);c.restore();
    }
    c.globalAlpha=1;c.shadowColor=this.acc;c.shadowBlur=20;
    if(bImg){
      var ar4=bImg.naturalWidth/bImg.naturalHeight;
      var dh4=fh,dw4=fh*ar4;
      c.save();c.scale(sx,sy);c.drawImage(bImg,-dw4/2,-fh+oy,dw4,dh4);c.restore();
    }else this._drawFB(c,fw,fh);
    c.shadowBlur=0;
    for(var ri=0;ri<3;ri++){
      var ra2=(0.55-ri*0.12)+0.2*Math.sin(Date.now()/80+ri);
      c.globalAlpha=Math.max(0,ra2);c.fillStyle=this.acc;
      var rp=Math.round((fw*.9+(ri+1)*50+25*Math.sin(Date.now()/(90+ri*30)))/PX)*PX;
      var bt4=Math.max(PX,(4-ri)*PX);
      c.fillRect(-rp,-fh/2-rp,rp*2,bt4);
      c.fillRect(-rp,-fh/2+rp-bt4,rp*2,bt4);
      c.fillRect(-rp,-fh/2-rp+bt4,bt4,rp*2-bt4*2);
      c.fillRect(rp-bt4,-fh/2-rp+bt4,bt4,rp*2-bt4*2);
    }
    // ---- Fire rush sprite: show in front of attacker during rush heavy or rush special ----
    var htype2=this.cfg.heavyType||'rush';
    var stype2=this.cfg.specialType||'rush';
    var isRushHeavy=this.isIn('heavyAttack')&&htype2==='rush';
    var isRushSpec=isSpec&&stype2==='rush';
    if(isRushHeavy||isRushSpec){
      var spMax2=Math.round(22/BASE_SPEED);
      var spElapsed2=spMax2-Math.max(0,spTimer);
      var fIdx=Math.min(2,Math.floor(spElapsed2/spMax2*3));
      var fireImg=imgs[fIdx===0?'fire1':fIdx===1?'fire2':'fire3'];
      // fW/fH: large enough to look impactful (image is 1024x1024 area)
      var fW=fIdx===2?1200:fIdx===1?900:600;
      var fH=fW*0.45; // ~16:7 aspect matches the flame shape
      // In local space: x=right of fighter, y upward is negative
      var fOx=fw*0.5+60;
      var fOy=-fh*0.45; // torso center (y is negative = upward in canvas)
      var fAlpha=fIdx===2?Math.max(0,1-(spElapsed2/spMax2-0.66)/0.34):1;
      c.globalAlpha=fAlpha;c.shadowBlur=0;c.imageSmoothingEnabled=false;
      if(fireImg&&fireImg.complete&&fireImg.naturalWidth>0){
        c.drawImage(fireImg,fOx,fOy-fH/2,fW,fH);
      }
      c.globalAlpha=1;
    }
  }else{
    c.globalAlpha=0.45;
    if(bImg){
      var ar5=bImg.naturalWidth/bImg.naturalHeight;
      var dh5=fh,dw5=fh*ar5;
      c.drawImage(bImg,-dw5/2,-fh,dw5,dh5);
    }else this._drawFB(c,fw,fh);
  }
  c.shadowBlur=0;c.restore();c.globalAlpha=1;
};

Fighter.prototype._drawFB=function(c,fw,fh){
  c.fillStyle=this.col;c.fillRect(-fw/2,-fh,fw,fh*.55);
  c.fillStyle=this.acc;c.fillRect(-fw*.35,-fh-70,fw*.7,74);
  c.fillStyle='#fff';c.fillRect(-fw*.2,-fh-55,28,18);c.fillRect(fw*.05,-fh-55,28,18);
  c.fillStyle=this.col;
  c.fillRect(-fw/2+5,-fh*.45,fw*.4,fh*.45);c.fillRect(fw/2-fw*.4-5,-fh*.45,fw*.4,fh*.45);
  if(this.isIn('lightAttack','heavyAttack','special')){
    c.fillStyle=this.acc;c.fillRect(fw/2-10,-fh*.75,this.state==='heavyAttack'?150:100,36);
  }
};

// ===== HIT CHECKS =====
function checkHits(){
  // Fighter hitboxes
  var h1=p1.getHitbox(),h2=p2.getHitbox();
  if(h1){
    var dx=h1.x-p2.x,dy=h1.y-(p2.y-p2.h/2);
    if(Math.sqrt(dx*dx+dy*dy)<h1.r+80){
      if(p2.takeDamage(h1.dmg,h1.kind,p1.x,p1)){
        if(h1.kind!=='special')p1.gainG(h1.dmg*2.8);
        p1.hitDone=true;
        hitStopTimer=h1.kind==='special'?24:h1.kind==='heavy'?14:8;
      }
    }
  }
  if(h2){
    var dx2=h2.x-p1.x,dy2=h2.y-(p1.y-p1.h/2);
    if(Math.sqrt(dx2*dx2+dy2*dy2)<h2.r+80){
      if(p1.takeDamage(h2.dmg,h2.kind,p2.x,p2)){
        if(h2.kind!=='special')p2.gainG(h2.dmg*2.8);
        p2.hitDone=true;
        hitStopTimer=h2.kind==='special'?24:h2.kind==='heavy'?14:8;
      }
    }
  }
  // Projectile hits
  var alive=[];
  for(var i=0;i<projectiles.length;i++){
    var proj=projectiles[i];
    proj.trail.push({x:proj.x,y:proj.y});
    if(proj.trail.length>8)proj.trail.shift();
    proj.x+=proj.dir*proj.spd;
    proj.life--;
    var hit=false;
    var target=proj.owner===p1?p2:p1;
    var attacker=proj.owner;
    var ddx=proj.x-target.x,ddy=proj.y-(target.y-target.h/2);
    if(Math.sqrt(ddx*ddx+ddy*ddy)<proj.r+60){
      var kind=proj.isSpecial?'special':'heavy';
      if(target.takeDamage(proj.dmg,kind,attacker.x,attacker)){
        if(!proj.isSpecial)attacker.gainG(proj.dmg*2.8);
        hitStopTimer=proj.isSpecial?20:9;
      }
      spawnExplosion(proj.x,proj.y,proj.r*2,6);
      hit=true;
    }
    if(!hit&&proj.life>0&&proj.x>0&&proj.x<W)alive.push(proj);
  }
  projectiles=alive;
}

function checkRoundEnd(){
  if(gState!=='fight'||roundEndHandled)return;
  var winner=null;
  var byTimeout=false;
  if(p1.hp<=0&&p2.hp<=0)winner='draw';
  else if(p1.hp<=0)winner='p2';
  else if(p2.hp<=0)winner='p1';
  else if(rndTimer<=0){winner=p1.hp>p2.hp?'p1':p2.hp>p1.hp?'p2':'draw';byTimeout=true;}
  if(!winner)return;
  roundEndHandled=true;gState='roundEnd';
  if(winner==='p1'){
    p1.wins++;
    if(!byTimeout&&p2.hp<=0)p2.startDeath();
    showAnn('P1 WIN!',2200,true);sfxVictory();
  }else if(winner==='p2'){
    p2.wins++;
    if(!byTimeout&&p1.hp<=0)p1.startDeath();
    showAnn('P2 WIN!',2200,true);sfxVictory();
  }else showAnn('DRAW!',2200,true);
  var mw=p1.wins>=WINS_NEEDED?p1:p2.wins>=WINS_NEEDED?p2:null;
  if(mw){
    // On KO: explode loser + victory bob. On timeout: neither
    var loser=mw===p1?p2:p1;
    if(!byTimeout){loser.startDeath();mw.isWinner=true;}
    setTimeout(function(){showAnn(mw===p1?'P1 WINS!':'P2 WINS!',4000,true);gState='matchEnd';launchFireworks();},1400);
    setTimeout(goIntro,7000);
  }else{
    // Reset victoryBob for next round
    setTimeout(function(){round++;p1.isWinner=false;p2.isWinner=false;roundEndHandled=false;resetRound();},3200);
  }
}

var PX_COLS={
  morning:{skyT:[0xf4,0xc9,0x8a],skyB:[0x7f,0xa8,0xc0],sun:'#ffe87a',sunG:'#ffcc44',
    bldg:'#8a6858',win:'#ffe880',ground:'#6a8e4a',gline:'#4a6e2a'},
  noon:   {skyT:[0x5a,0xb8,0xe8],skyB:[0x28,0x68,0xa0],sun:'#ffffa0',sunG:'#ffe860',
    bldg:'#607888',win:'#c0e0ff',ground:'#3a7828',gline:'#285818'},
  evening:{skyT:[0xe8,0x50,0x30],skyB:[0x28,0x08,0x38],sun:'#ffdc60',sunG:'#ff8020',
    bldg:'#180c18',win:'#ffc840',ground:'#281808',gline:'#483808'}
};
function lerpCol(a,b,t){
  return 'rgb('+Math.round(a[0]+(b[0]-a[0])*t)+','+Math.round(a[1]+(b[1]-a[1])*t)+','+Math.round(a[2]+(b[2]-a[2])*t)+')';
}
function drawAnimatedBG(dt){
  var pc=PX_COLS[bgTime];
  pxctx.clearRect(0,0,PW,PH);
  // Sky: 6 horizontal bands (dithered gradient)
  var BANDS=6;
  for(var band=0;band<BANDS;band++){
    var t=band/BANDS;
    var y0=Math.floor(t*PFLOOR),y1=Math.floor((band+1)/BANDS*PFLOOR);
    pxctx.fillStyle=lerpCol(pc.skyT,pc.skyB,t);
    pxctx.fillRect(0,y0,PW,Math.max(1,y1-y0));
  }
  // Sun (pixel circle, flat shaded)
  var sx=Math.floor(BG[bgTime].sunX/PX),sy=Math.floor(BG[bgTime].sunY/PX),sr=10;
  for(var dy=-sr;dy<=sr;dy++){for(var dx=-sr;dx<=sr;dx++){
    if(dx*dx+dy*dy<=sr*sr){pxR(pxctx,sx+dx,sy+dy,1,1,dx*dx+dy*dy<(sr*0.5)*(sr*0.5)?pc.sun:pc.sunG);}
  }}
  // Clouds / stars
  bgOffset+=0.4;
  if(bgTime==='evening'){
    bgParticles.forEach(function(p){
      p.twinkle+=0.04;
      if(Math.sin(p.twinkle)>0){pxR(pxctx,Math.floor(p.x/PX),Math.floor(p.y/PX),Math.ceil(p.r),Math.ceil(p.r),'#ffe8a0');}
    });
  }else{
    bgParticles.forEach(function(p){
      p.x+=p.spd;if(p.x-p.w>W)p.x=-p.w;
      pxctx.fillStyle='rgba(255,255,255,0.8)';
      pxctx.fillRect(Math.floor(p.x/PX),Math.floor(p.y/PX),Math.floor(p.w/PX),Math.floor(p.h/PX));
      pxctx.fillRect(Math.floor(p.x/PX)+Math.floor(p.w/PX*0.2),Math.floor(p.y/PX)-Math.floor(p.h/PX*0.4),Math.floor(p.w/PX*0.5),Math.floor(p.h/PX));
    });
  }
  // Buildings
  var bldgs=[[0,240,180,360],[210,180,150,480],[390,300,120,300],[540,150,210,510],
   [780,240,135,420],[945,180,180,480],[1155,270,150,390],[1335,165,195,495],
   [1560,225,165,435],[1755,195,165,465]];
  bldgs.forEach(function(b){
    var bx=Math.floor(b[0]/PX),bfloor=PFLOOR;
    var bw=Math.ceil(b[2]/PX),bh=Math.ceil(b[3]/PX),by=bfloor-bh;
    pxR(pxctx,bx,by,bw,bh,pc.bldg);
    for(var wy2=by+4;wy2<bfloor-4;wy2+=11){
      for(var wx2=bx+3;wx2<bx+bw-3;wx2+=8){
        if((wx2+wy2)%5===0)continue;
        var wa=1;
        if(bgTime==='evening'){
          var seed=(wx2*7+wy2*13)%200,t2=bgOffset*0.016;
          var offCy=Math.sin(t2/((6+seed%8)*2.5)+seed*0.22);
          wa=offCy<-0.5?0.08:Math.max(0.1,0.6+Math.sin(t2/(6+seed%8)*Math.PI*2+seed*0.31)*0.28);
        }
        pxctx.globalAlpha=wa;pxR(pxctx,wx2,wy2,5,4,pc.win);pxctx.globalAlpha=1;
      }
    }
  });
  // Ground
  pxR(pxctx,0,PFLOOR,PW,PH-PFLOOR,pc.ground);
  pxR(pxctx,0,PFLOOR,PW,2,pc.gline);
  // Scale up to bg canvas (pixelated)
  bgctx.clearRect(0,0,W,H);bgctx.imageSmoothingEnabled=false;
  bgctx.drawImage(pxCanvas,0,0,W,H);
  // Label at full res
  bgctx.font='bold 22px monospace';bgctx.fillStyle='rgba(0,0,0,0.25)';bgctx.textAlign='left';
  bgctx.fillText(BG[bgTime].label,16,FLOOR-14);
}

function drawProjectiles(c){
  var PROJ_MAX_LIFE=120;
  for(var i=0;i<projectiles.length;i++){
    var proj=projectiles[i];
    var elapsed=PROJ_MAX_LIFE-proj.life;
    var fIdx=elapsed<20?0:elapsed<40?1:2;
    var projImg=imgs['proj'+(fIdx+1)];
    var baseW=proj.isSpecial?800:480;
    var baseH=proj.isSpecial?400:240;
    var sc=[0.55,0.78,1.0][fIdx];
    var pW=Math.round(baseW*sc);
    var pH=Math.round(baseH*sc);
    var gx2=Math.round(proj.x/PX)*PX;
    var gy2=Math.round(proj.y/PX)*PX;
    c.save();
    c.translate(gx2,gy2);
    if(proj.dir===-1)c.scale(-1,1);
    c.imageSmoothingEnabled=false;
    if(projImg&&projImg.complete&&projImg.naturalWidth>0){
      c.drawImage(projImg,-pW/2,-pH/2,pW,pH);
    }else{
      var pr=Math.max(PX*2,Math.round(proj.r/PX)*PX);
      var pcol=proj.isSpecial?'#4488ff':'#00aaff';
      c.globalAlpha=0.4;c.fillStyle=pcol;c.fillRect(-pr-PX,-pr-PX,pr*2+PX*2,pr*2+PX*2);
      c.globalAlpha=1;c.fillStyle='#fff';c.fillRect(-PX,-PX,PX*2,PX*2);
    }
    c.restore();
  }
}

function drawExplosions(c){
  var expS=lastDt*60||1;
  globalExplosions=globalExplosions.filter(function(e){return e.life>0;});
  // Sort: draw larger ones first (behind smaller ones)
  globalExplosions.slice().sort(function(a,b){return b.size-a.size;}).forEach(function(e){
    var elapsed=e.ml-e.life;
    var frameIdx=Math.min(EXP_FRAMES-1,Math.floor(elapsed/EXP_FRAME_DUR));
    // frame 0→EXP_1, 1→EXP_2(peak), 2→EXP_3
    var imgKey=frameIdx===0?'exp1':frameIdx===1?'exp2':'exp3';
    var img=imgs[imgKey];
    var alpha=e.life/e.ml;
    // peak frame (1) is fully opaque; fade out on last frame
    if(frameIdx===2)alpha=Math.max(0,(e.life/EXP_FRAME_DUR));
    else alpha=1;
    var sz=Math.round(e.size/PX)*PX*6;
    sz=Math.max(PX*4,sz);
    var gx=Math.round(e.x/PX)*PX;
    var gy=Math.round(e.y/PX)*PX;
    c.globalAlpha=alpha;
    if(img&&img.complete&&img.naturalWidth>0){
      c.imageSmoothingEnabled=false;
      c.drawImage(img,gx-sz/2,gy-sz/2,sz,sz);
    }else{
      // Fallback if image not loaded
      var a2=e.life/e.ml;
      c.globalAlpha=a2*.7;c.fillStyle='#ff4400';
      c.fillRect(gx-sz/2,gy-sz/2,sz,sz);
    }
    c.globalAlpha=1;
    e.x+=e.vx*expS;e.y+=e.vy*expS;e.life-=expS;
  });
}

function drawFireworks(){
  fwctx.clearRect(0,0,W,H);
  fireworks=fireworks.filter(function(f){return f.life>0;});
  fireworks.forEach(function(f){
    var fS=lastDt*60||1;
    var a=f.life/f.ml;
    var gx=Math.round(f.x/PX)*PX,gy=Math.round(f.y/PX)*PX;
    var sz=Math.max(PX,Math.round(f.r/PX)*PX);
    fwctx.globalAlpha=a;fwctx.fillStyle=f.col;fwctx.fillRect(gx-sz/2,gy-sz/2,sz,sz);
    fwctx.globalAlpha=Math.min(1,a*1.4);fwctx.fillStyle='#ffffff';fwctx.fillRect(gx-PX/2,gy-PX/2,PX,PX);
    fwctx.globalAlpha=1;
    f.x+=f.vx*fS;f.y+=f.vy*fS;f.vy+=0.2*fS;f.vx*=Math.pow(0.97,fS);f.r*=Math.pow(0.97,fS);f.life-=fS;
  });
}

function drawFighterSimple(c,fighter,alphaOverride){
  if(!fighter||!fighter.visible)return;
  var cx=fighter.x,cy=fighter.y,fw=fighter.w,fh=fighter.h;
  var bImg=fighter.id==='p1'?imgs.p1b:imgs.p2b;
  c.save();c.translate(cx,cy);
  if(fighter.facing===-1)c.scale(-1,1);
  if(alphaOverride!==undefined)c.globalAlpha=alphaOverride;
  if(bImg){
    var ar=bImg.naturalWidth/bImg.naturalHeight,dh=fh,dw=fh*ar;
    c.drawImage(bImg,-dw/2,-fh,dw,dh);
  }else{
    // fallback shape
    c.fillStyle=fighter.col;c.fillRect(-fw/2,-fh,fw,fh*.55);
    c.fillStyle=fighter.acc;c.fillRect(-fw*.35,-fh-70,fw*.7,74);
  }
  c.restore();c.globalAlpha=1;
}
function drawSpecialLayer(){
  sctx.clearRect(0,0,W,H);
  if(!spEffectActive||!spAttacker)return;
  var t=Date.now();
  var opp=spAttacker===p1?p2:p1;
  // 1. Draw opponent dim
  if(opp)drawFighterSimple(sctx,opp,0.38);
  // 2. Draw attacker: always draw the fighter, then overlay glow rings
  if(spAttacker){
    // Draw attacker at full brightness
    drawFighterSimple(sctx,spAttacker,1.0);
    // Overlay color tint pulse
    var fw=spAttacker.w,fh=spAttacker.h;
    sctx.save();sctx.translate(spAttacker.x,spAttacker.y);
    if(spAttacker.facing===-1)sctx.scale(-1,1);
    sctx.globalAlpha=0.28+0.1*Math.sin(t/60);
    sctx.fillStyle=spAttacker.acc;
    var bImg2=spAttacker.id==='p1'?imgs.p1b:imgs.p2b;
    if(bImg2){var ar2=bImg2.naturalWidth/bImg2.naturalHeight,dh2=fh,dw2=fh*ar2;sctx.fillRect(-dw2/2,-fh,dw2,dh2);}
    else{sctx.fillRect(-fw/2,-fh,fw,fh);}
    // Pixel glow rings: axis-aligned hollow squares
    [0,1,2].forEach(function(i){
      var ra=Math.max(0,(0.55-i*0.15)+0.18*Math.sin(t/80+i));
      sctx.globalAlpha=ra;sctx.fillStyle=spAttacker.acc;
      var rp=Math.round((fw*.9+(i+1)*45+18*Math.sin(t/(90+i*25)))/PX)*PX;
      var bt2=Math.max(PX,(3-i)*PX);
      // top/bottom/left/right bars of the square ring
      sctx.fillRect(-rp,     -fh/2-rp,       rp*2, bt2);
      sctx.fillRect(-rp,     -fh/2+rp-bt2,   rp*2, bt2);
      sctx.fillRect(-rp,     -fh/2-rp+bt2,   bt2,  rp*2-bt2*2);
      sctx.fillRect(rp-bt2,  -fh/2-rp+bt2,   bt2,  rp*2-bt2*2);
    });
    // Use cached glow if available (bonus layer on top)
    if(spGlowCache){
      sctx.globalAlpha=0.45;
      var gc=spGlowCache;
      sctx.drawImage(gc.canvas,-gc.ox,-gc.oy);
    }
    sctx.restore();sctx.globalAlpha=1;
  }
  spTimer-=(lastDt*60||1);if(spTimer<=0){spEffectActive=false;spCanvas.style.opacity='0';spGlowCache=null;spAttacker=null;}
}

// ===== MAIN LOOP =====
var lt=0,TARGET_FPS=30,FRAME_MS=1000/TARGET_FPS,frameDebt=0,lastDt=0.016;
function loop(ts){
  // Throttle to TARGET_FPS
  if(lt!==0){
    var elapsed=ts-lt;
    if(elapsed<FRAME_MS-1){requestAnimationFrame(loop);return;}
  }
  var dt=Math.min((ts-lt)/1000,.1);lt=ts;lastDt=dt;
  if(gState==='intro'){
    bgctx.clearRect(0,0,W,H);
    drawIntro();drawFireworks();requestAnimationFrame(loop);return;
  }

  // Update animated background always
  drawAnimatedBG(dt);

  if(!frozen){
    if(gState==='fight'){
      timerMs+=dt;if(timerMs>=1){timerMs-=1;rndTimer=Math.max(0,rndTimer-1);}
      if(hitStopTimer>0){
        // Freeze fighters; still draw/count down
        hitStopTimer-=lastDt*60||1;
        if(hitStopTimer<0)hitStopTimer=0;
      }else{
        p1.cpuThink(p2,dt);p2.cpuThink(p1,dt);
        p1.update(p2,dt);p2.update(p1,dt);
        separateFighters(p1,p2);
        checkHits();checkRoundEnd();
      }
    }else if(gState==='roundEnd'||gState==='matchEnd'){
      if(hitStopTimer>0){hitStopTimer-=lastDt*60||1;if(hitStopTimer<0)hitStopTimer=0;}
      else{
        if(p1&&p2){p1.update(p2,dt);p2.update(p1,dt);separateFighters(p1,p2);}
      }
    }
  }

  ctx.clearRect(0,0,W,H);
  [p1,p2].forEach(function(f){
    if(!f.visible)return;
    ctx.save();ctx.globalAlpha=.16;ctx.fillStyle='#000';
    // Pixel shadow: stacked flat rectangles forming an ellipse-like shape
    var sx=Math.round(f.x/PX)*PX, sy=Math.round((FLOOR+12)/PX)*PX;
    var sw=Math.round(f.w/2/PX)*PX*2, sh=16;
    ctx.fillRect(sx-sw/2, sy,       sw,     PX);
    ctx.fillRect(sx-sw/2+PX, sy+PX, sw-PX*2, PX);
    ctx.fillRect(sx-sw/2+PX*2, sy+PX*2, sw-PX*4, PX);
    ctx.restore();
  });
  p1.draw(ctx);p2.draw(ctx);
  drawProjectiles(ctx);
  drawExplosions(ctx);
  if(spEffectActive)drawSpecialLayer();
  drawFireworks();
  updateHUD();
  requestAnimationFrame(loop);
}
initBgParticles();
initPools();
drawIntro();
requestAnimationFrame(loop);
</script>
