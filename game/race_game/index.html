<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- iPhoneでホーム画面に追加した際、Safariのアドレスバー無しの
     フルスクリーン(スタンドアロン)表示で起動させるための設定 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ROBO RUSH">
<title>ROBO RUSH -- Retro Robot Race</title>
<!-- レトロ風の見出し用ピクセルフォント（読み込めない場合は monospace にフォールバック） -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 縦持ちの場合はゲームを隠して回転を促す（横向き専用） -->
<div id="rotateOverlay" class="rotate-overlay">
  <div class="rotate-msg">
    <div class="rotate-icon">⟳📱</div>
    横向きにしてください<br>
    <span class="rotate-sub">Please rotate your device to landscape</span>
  </div>
</div>

<!-- ============================================================ -->
<!-- 0. オープニング画面（タイトルロゴ・背景はJS側でPNGを指定）              -->
<!-- ============================================================ -->
<div id="openingScreen" class="screen">
  <div id="openingBg" class="opening-bg"></div>
  <div class="opening-overlay">
    <img id="openingLogo" class="opening-logo hidden" alt="ROBO RUSH">
    <div id="openingLogoFallback" class="game-title opening-logo-fallback">ROBO<span class="accent">RUSH</span></div>
    <button id="openingStartBtn" class="opening-tap">TAP TO START</button>
  </div>
</div>

<!-- ============================================================ -->
<!-- 1. キャラクター選択画面（ゲーム開始前に必ず表示される）                 -->
<!-- ============================================================ -->
<div id="settingsScreen" class="screen hidden">
  <div class="scanlines"></div>
  <header class="title-block">
    <h1 class="game-title">CHARACTER<span class="accent">SELECT</span></h1>
    <p class="game-sub">// CHOOSE YOUR ROBOT //</p>
  </header>

  <!-- 10体のロボット + カスタム画像枠 をJSで生成 -->
  <div id="rosterGrid" class="roster-grid"></div>

  <!-- 選んだロボットのプレビューと名前入力 -->
  <div class="player-preview-row">
    <div id="playerPreview" class="drop-zone player-preview">
      <div class="dz-placeholder">ロボットを選択してください</div>
      <img id="playerPreviewImg" style="display:none;">
    </div>
    <div class="player-preview-fields">
      <label class="field-label">PLAYER NAME</label>
      <input id="playerNameInput" class="name-input" maxlength="14" value="PLAYER">
      <p class="hint">上のリストから選択、または「CUSTOM」から自分の画像をアップロードできます。</p>
    </div>
  </div>

  <div class="start-row">
    <button id="startBtn" class="btn-start">GAME START</button>
    <p class="hint">対戦相手の3体はこの中からランダムで選ばれます。</p>
  </div>
</div>

<!-- ============================================================ -->
<!-- 2. ゲーム本体（キャンバス + HUD + タッチ操作）                      -->
<!-- ============================================================ -->
<div id="gameContainer" class="screen hidden">
  <canvas id="gameCanvas"></canvas>

  <!-- 画面上部HUD：順位・ラップ・ターボゲージ・速度・所持アイテム -->
  <div id="hud">
    <div class="hud-box hud-rank"><span class="hud-label">RANK</span><span id="hudRank">1/4</span></div>
    <div class="hud-box hud-lap"><span class="hud-label">LAP</span><span id="hudLap">1/3</span></div>
    <div class="hud-box hud-speed"><span class="hud-label">SPEED</span><span id="hudSpeed">000</span></div>
    <div class="hud-box hud-item"><span class="hud-label">ITEM</span><span id="hudItem">--</span></div>
  </div>
  <div id="turboGaugeWrap" class="turbo-wrap">
    <span class="hud-label">TURBO</span>
    <div class="turbo-bar"><div id="turboFill" class="turbo-fill"></div></div>
  </div>

  <!-- カウントダウン表示 -->
  <div id="countdown" class="countdown hidden">3</div>

  <!-- タッチ操作（スマホ用） -->
  <div id="touchControls" class="touch-controls">
    <div class="touch-left">
      <button id="btnUp" class="touch-btn round">▲</button>
      <button id="btnDown" class="touch-btn round">▼</button>
    </div>
    <div class="touch-right">
      <button id="btnAttack" class="touch-btn square">FIRE</button>
      <button id="btnJump" class="touch-btn round jump-btn">JUMP</button>
      <button id="btnTurbo" class="touch-btn square turbo-btn">TURBO</button>
    </div>
  </div>
</div>

<!-- ============================================================ -->
<!-- 3. 表彰式画面（結果一覧は表示せず、表彰台の見た目だけで順位を伝える）      -->
<!-- ============================================================ -->
<div id="resultScreen" class="screen hidden">
  <canvas id="podiumCanvas"></canvas>
  <button id="restartBtn" class="btn-start podium-restart">RACE AGAIN</button>
</div>

<script src="script.js"></script>
</body>
</html>
